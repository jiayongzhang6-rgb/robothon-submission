# AEGIS v6 Configuration
# Attention-Guided Decision Visualization for Autonomous Navigation

system:
  name: "AEGIS v6"
  version: "6.0"
  seed: 42

environment:
  grid_size: 15
  cell_size: 60  # pixels per cell

goals:
  A: [3, 3]
  B: [11, 3]
  C: [11, 11]
  D: [3, 11]

obstacles:
  - {x: 6, y: 3, w: 3, h: 2}
  - {x: 3, y: 7, w: 2, h: 3}
  - {x: 10, y: 7, w: 2, h: 3}
  - {x: 6, y: 11, w: 3, h: 2}

soft_cost_zones:
  - {x: 5, y: 4, w: 5, h: 7, penalty: 0.3}

risk_field:
  center: [7, 7]
  max_radius: 4.0
  peak_intensity: 0.85
  enable: true

video:
  width: 900
  height: 900
  fps: 30
  duration: 60  # seconds

hud:
  show_state: true
  show_confidence: true
  show_metrics: true  # last 5 seconds only
